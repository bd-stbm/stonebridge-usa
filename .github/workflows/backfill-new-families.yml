name: Backfill new families (one-off)

# Manual-trigger only. No schedule — re-running burns Masttro API calls.
# After Markiles + Miller have been backfilled and verified, this workflow
# can stay disabled. If another family is added later, edit TARGET_NODES
# in scripts/backfill_new_families.py and trigger again.

on:
  workflow_dispatch:

concurrency:
  group: backfill-new-families
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      MASTTRO_API_KEY:    ${{ secrets.MASTTRO_API_KEY }}
      MASTTRO_API_SECRET: ${{ secrets.MASTTRO_API_SECRET }}
      SUPABASE_DB_URL:    ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Backfill 24m Holdings + Transactions for target families
        run: python scripts/backfill_new_families.py
