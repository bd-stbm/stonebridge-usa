name: Daily sync (Masttro + yfinance)

on:
  schedule:
    # 22:00 UTC Mon-Fri.
    # ~8am Sydney AEST / 9am AEDT next morning — after AU close + US close,
    # custodian feeds have had overnight to settle.
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

concurrency:
  group: daily-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      MASTTRO_API_KEY:    ${{ secrets.MASTTRO_API_KEY }}
      MASTTRO_API_SECRET: ${{ secrets.MASTTRO_API_SECRET }}
      SUPABASE_DB_URL:    ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Masttro daily (Holdings + Transactions + DataFeedUpdates)
        run: python scripts/sync_masttro_daily.py

      - name: yfinance refresh
        run: python scripts/sync_yfinance.py
